<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmelden - AstroSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* GENEL AYARLAR */
        body {
            background-color: #FDFBF7;
            font-family: 'Arial', sans-serif;
            color: #1a1a1a;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* FORM KUTUSU */
        .register-container {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(197, 163, 255, 0.3); /* Mor gölge */
            width: 100%;
            max-width: 500px;
            border-top: 5px solid #C5A3FF; /* Galaxy Purple üst çizgi */
        }

        h1 {
            text-align: center;
            color: #57575F;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        /* FORM ELEMANLARI */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: bold;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box; /* Taşmayı engeller */
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #FFA8D7; /* Nebula Pink focus rengi */
        }

        /* İKİLİ YANYANA ALANLAR İÇİN */
        .row {
            display: flex;
            gap: 15px;
        }
        
        .col {
            flex: 1;
        }

        /* KAYIT BUTONU */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: #C5A3FF; /* Galaxy Purple */
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #b085f5;
            transform: scale(1.02);
        }

        /* ALT LİNKLER */
        .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .footer-links a {
            color: #57575F;
            text-decoration: none;
            margin: 0 10px;
        }

        .footer-links a:hover {
            color: #FFA8D7;
        }

        /* UFAK BİLGİ NOTU */
        .note {
            font-size: 0.8rem;
            color: #999;
            margin-top: 5px;
        }

        /* Responsive düzenlemeler */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .register-container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 1.75rem;
            }
        }

        @media (max-width: 576px) {
            body {
                padding: 5px;
            }
            
            .register-container {
                padding: 20px 15px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg" style="background-color: #700919;" data-bs-theme="light">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">
            <img src="img/logo.png" alt="AstroSync Logo" class="logo">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="radiospot.html">Radio Spot</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="faq.html">FAQ</a>
                </li>
                <li class="nav-item">
                    <a class="btn btn-outline-light" href="anmelden.html">Einloggen</a>
                </li>
                <li class="nav-item">
                    <div class="dropdown">
                        <button class="btn btn-secondary dropdown-toggle" type="button" id="ttsDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                            🔊 Lesen
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end p-3" aria-labelledby="ttsDropdown" style="min-width: 280px;">
                            <li class="mb-2">
                                <div class="d-flex gap-2">
                                    <button class="btn btn-sm btn-primary flex-fill" id="playBtn" onclick="toggleSpeech()">
                                        ▶️ Oynat
                                    </button>
                                    <button class="btn btn-sm btn-warning flex-fill" id="pauseBtn" onclick="pauseSpeech()" style="display:none;">
                                        ⏸️ Duraklat
                                    </button>
                                    <button class="btn btn-sm btn-danger" onclick="stopSpeech()">
                                        ⏹️ Durdur
                                    </button>
                                </div>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li class="mb-2">
                                <label class="form-label small">Hız: <span id="rateValue">1.0</span>x</label>
                                <input type="range" class="form-range" id="rateSlider" min="0.5" max="2" step="0.1" value="1" oninput="updateRate(this.value)">
                            </li>
                            <li class="mb-2">
                                <label class="form-label small">Ton: <span id="pitchValue">1.0</span></label>
                                <input type="range" class="form-range" id="pitchSlider" min="0.5" max="2" step="0.1" value="1" oninput="updatePitch(this.value)">
                            </li>
                        </ul>
                    </div>
                </li>
            </ul>
        </div>
    </div>
</nav>
    <div class="register-container">
        <h1>Werde Teil des Kosmos</h1>
        
        <form action="#" method="post">
            
            <div class="form-group">
                <label for="username">Benutzername</label>
                <input type="text" id="username" name="username" placeholder="z.B. GalaxyTraveler" required>
            </div>

            <div class="form-group">
                <label for="email">E-Mail-Adresse</label>
                <input type="email" id="email" name="email" placeholder="deine@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" name="password" placeholder="********" required>
            </div>

            <div class="row">
                <div class="col form-group">
                    <label for="species">Spezies</label>
                    <select id="species" name="species">
                        <option value="mensch">Mensch</option>
                        <option value="alien">Alien</option>
                        <option value="cyborg">Cyborg</option>
                        <option value="marsianer">Marsianer</option>
                        <option value="zeitreisender">Zeitreisender</option>
                    </select>
                </div>
                <div class="col form-group">
                    <label for="planet">Heimatplanet</label>
                    <select id="planet" name="planet">
                        <option value="erde">Erde</option>
                        <option value="mars">Mars</option>
                        <option value="venus">Venus</option>
                        <option value="kepler">Kepler-22b</option>
                        <option value="unbekannt">Unbekannt</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="birthdate">Geburtsdatum</label>
                <input type="date" id="birthdate" name="birthdate" required>
            </div>

            <div class="row">
                <div class="col form-group">
                    <label for="birthtime">Geburtszeit</label>
                    <input type="time" id="birthtime" name="birthtime" required>
                    <div class="note">*Wichtig für den Aszendenten</div>
                </div>
                <div class="col form-group">
                    <label for="birthplace">Geburtsort</label>
                    <input type="text" id="birthplace" name="birthplace" placeholder="Stadt, Land" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">Abheben & Registrieren 🚀</button>
        </form>

        <div class="footer-links">
            <a href="impressum.html">Impressum</a>
            <a href="faq.html">FAQ</a>
        </div>
    </div>
<script>
let speechSynthesis = window.speechSynthesis;
let currentUtterance = null;
let isPaused = false;
let speechRate = 1.0;
let speechPitch = 1.0;

function getMainContent() {
  const mainContent = [];
  
  // Başlık
  const h1 = document.querySelector('h1');
  if (h1 && h1.textContent.trim()) {
    mainContent.push(h1.textContent.trim());
  }
  
  // Form label'ları (sadece label'lar, input değerleri değil)
  const labels = document.querySelectorAll('label');
  labels.forEach(label => {
    const text = label.textContent.trim();
    if (text && !text.includes('*')) {
      mainContent.push(text);
    }
  });
  
  return mainContent.join('. ');
}

function toggleSpeech() {
  if (speechSynthesis.speaking && !isPaused) {
    pauseSpeech();
  } else if (isPaused) {
    resumeSpeech();
  } else {
    startSpeech();
  }
}

function startSpeech() {
  const text = getMainContent();
  
  if (!text) {
    alert('Okunacak içerik bulunamadı.');
    return;
  }
  
  speechSynthesis.cancel();
  
  currentUtterance = new SpeechSynthesisUtterance(text);
  currentUtterance.lang = "de-DE";
  currentUtterance.rate = speechRate;
  currentUtterance.pitch = speechPitch;
  
  currentUtterance.onend = function() {
    document.getElementById('playBtn').style.display = 'inline-block';
    document.getElementById('pauseBtn').style.display = 'none';
    isPaused = false;
  };
  
  currentUtterance.onerror = function(event) {
    console.error('Speech synthesis error:', event);
    alert('Sesli okuma hatası oluştu.');
  };
  
  speechSynthesis.speak(currentUtterance);
  document.getElementById('playBtn').style.display = 'none';
  document.getElementById('pauseBtn').style.display = 'inline-block';
  isPaused = false;
}

function pauseSpeech() {
  if (speechSynthesis.speaking) {
    speechSynthesis.pause();
    isPaused = true;
    document.getElementById('playBtn').style.display = 'inline-block';
    document.getElementById('pauseBtn').style.display = 'none';
  }
}

function resumeSpeech() {
  if (isPaused) {
    speechSynthesis.resume();
    isPaused = false;
    document.getElementById('playBtn').style.display = 'none';
    document.getElementById('pauseBtn').style.display = 'inline-block';
  }
}

function stopSpeech() {
  speechSynthesis.cancel();
  isPaused = false;
  document.getElementById('playBtn').style.display = 'inline-block';
  document.getElementById('pauseBtn').style.display = 'none';
  if (currentUtterance) {
    currentUtterance = null;
  }
}

function updateRate(value) {
  speechRate = parseFloat(value);
  document.getElementById('rateValue').textContent = value;
  if (speechSynthesis.speaking && currentUtterance) {
    stopSpeech();
    setTimeout(startSpeech, 100);
  }
}

function updatePitch(value) {
  speechPitch = parseFloat(value);
  document.getElementById('pitchValue').textContent = value;
  if (speechSynthesis.speaking && currentUtterance) {
    stopSpeech();
    setTimeout(startSpeech, 100);
  }
}

window.addEventListener('beforeunload', function() {
  speechSynthesis.cancel();
});
</script>
</body>
</html>

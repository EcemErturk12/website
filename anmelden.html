<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmelden - AstroSync</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="register-page-bg">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark bg-opacity-75">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">AstroSync</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="radiospot.html">Radio Spot</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
                    <li class="nav-item"><a class="nav-link active" href="anmelden.html">Anmelden</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="register-wrapper">
        <div class="register-container">
            <h1 style="text-align: center; color: #57575F; margin-bottom: 30px;">Werde Teil des Kosmos</h1>
            
            <form action="#" method="post">
                <div class="form-group">
                    <label class="form-label" for="username">Benutzername</label>
                    <input class="form-input" type="text" id="username" name="username" placeholder="z.B. GalaxyTraveler" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">E-Mail-Adresse</label>
                    <input class="form-input" type="email" id="email" name="email" placeholder="deine@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Passwort</label>
                    <input class="form-input" type="password" id="password" name="password" placeholder="********" required>
                </div>

                <div class="form-row">
                    <div class="form-col form-group">
                        <label class="form-label" for="species">Spezies</label>
                        <select class="form-select" id="species" name="species">
                            <option value="mensch">Mensch</option>
                            <option value="alien">Alien</option>
                            <option value="cyborg">Cyborg</option>
                            <option value="marsianer">Marsianer</option>
                        </select>
                    </div>
                    <div class="form-col form-group">
                        <label class="form-label" for="planet">Heimatplanet</label>
                        <select class="form-select" id="planet" name="planet">
                            <option value="erde">Erde</option>
                            <option value="mars">Mars</option>
                            <option value="venus">Venus</option>
                            <option value="kepler">Kepler-22b</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="birthdate">Geburtsdatum</label>
                    <input class="form-input" type="date" id="birthdate" name="birthdate" required>
                </div>

                <div class="form-row">
                    <div class="form-col form-group">
                        <label class="form-label" for="birthtime">Geburtszeit</label>
                        <input class="form-input" type="time" id="birthtime" name="birthtime" required>
                        <div class="note">*Wichtig für den Aszendenten</div>
                    </div>
                    <div class="form-col form-group">
                        <label class="form-label" for="birthplace">Geburtsort</label>
                        <input class="form-input" type="text" id="birthplace" name="birthplace" placeholder="Stadt, Land" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Abheben & Registrieren 🚀</button>
            </form>

            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="impressum.html">Impressum</a>
                <a href="faq.html">FAQ</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmelden - AstroSync</title>
    <style>
        /* GENEL AYARLAR */
        body {
            background-color: #FDFBF7;
            font-family: 'Arial', sans-serif;
            color: #1a1a1a;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* FORM KUTUSU */
        .register-container {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(197, 163, 255, 0.3); /* Mor gölge */
            width: 100%;
            max-width: 500px;
            border-top: 5px solid #C5A3FF; /* Galaxy Purple üst çizgi */
        }

        h1 {
            text-align: center;
            color: #57575F;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        /* FORM ELEMANLARI */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: bold;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box; /* Taşmayı engeller */
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #FFA8D7; /* Nebula Pink focus rengi */
        }

        /* İKİLİ YANYANA ALANLAR İÇİN */
        .row {
            display: flex;
            gap: 15px;
        }
        
        .col {
            flex: 1;
        }

        /* KAYIT BUTONU */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: #C5A3FF; /* Galaxy Purple */
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #b085f5;
            transform: scale(1.02);
        }

        /* ALT LİNKLER */
        .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .footer-links a {
            color: #57575F;
            text-decoration: none;
            margin: 0 10px;
        }

        .footer-links a:hover {
            color: #FFA8D7;
        }

        /* UFAK BİLGİ NOTU */
        .note {
            font-size: 0.8rem;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <h1>Werde Teil des Kosmos</h1>
        
        <form action="#" method="post">
            
            <div class="form-group">
                <label for="username">Benutzername</label>
                <input type="text" id="username" name="username" placeholder="z.B. GalaxyTraveler" required>
            </div>

            <div class="form-group">
                <label for="email">E-Mail-Adresse</label>
                <input type="email" id="email" name="email" placeholder="deine@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" name="password" placeholder="********" required>
            </div>

            <div class="row">
                <div class="col form-group">
                    <label for="species">Spezies</label>
                    <select id="species" name="species">
                        <option value="mensch">Mensch</option>
                        <option value="alien">Alien</option>
                        <option value="cyborg">Cyborg</option>
                        <option value="marsianer">Marsianer</option>
                        <option value="zeitreisender">Zeitreisender</option>
                    </select>
                </div>
                <div class="col form-group">
                    <label for="planet">Heimatplanet</label>
                    <select id="planet" name="planet">
                        <option value="erde">Erde</option>
                        <option value="mars">Mars</option>
                        <option value="venus">Venus</option>
                        <option value="kepler">Kepler-22b</option>
                        <option value="unbekannt">Unbekannt</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="birthdate">Geburtsdatum</label>
                <input type="date" id="birthdate" name="birthdate" required>
            </div>

            <div class="row">
                <div class="col form-group">
                    <label for="birthtime">Geburtszeit</label>
                    <input type="time" id="birthtime" name="birthtime" required>
                    <div class="note">*Wichtig für den Aszendenten</div>
                </div>
                <div class="col form-group">
                    <label for="birthplace">Geburtsort</label>
                    <input type="text" id="birthplace" name="birthplace" placeholder="Stadt, Land" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">Abheben & Registrieren 🚀</button>
        </form>

        <div class="footer-links">
            <a href="impressum.html">Impressum</a>
            <a href="faq.html">FAQ</a>
        </div>
    </div>

</body>
</html>

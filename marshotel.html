<!DOCTYPE html>
<!-- Alle Elemente können (und sollen) verändert werden. Dieses Template dient als Orientierung, wie Bootstrap in Internetseiten eingebaut werden kann. -->
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Javascript Dateien -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Eigene Styles/CSS Dateien -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Website Titel -->
    <title>AstroSync</title>
</head>
<body>
  <div id="navbar"></div>
  <div id="carouselExampleRide" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="img/marshotelblick.png" class="d-block w-100" alt="MarsHotelBlick">
      </div>
      <div class="carousel-item">
        <img src="img/activity.png" class="d-block w-100" alt="Activity">
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleRide" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleRide" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>
 <div class="card w-75 mb-3">
  <div class="card-body">
    <h5 class="card-title">🔴 Mars Dune Resort</h5>
    <p class="card-text">Das Mars Dune Resort verbindet Abenteuer mit Komfort.
   Erkunden Sie die rote Landschaft, genießen Sie spektakuläre Sonnenuntergänge und teilen 
   Sie besondere Momente bei interstellaren Aktivitäten. Mars war noch nie so einladend.</p>
    <a href="urlaub.html" class="btn btn-primary">Jetzt buchen!</a>
  </div>
</div>
</div>
  <div id="footer"></div>
 <script>
  fetch("navbar.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("navbar").innerHTML = data;
    })
    .catch(err => console.error("Navbar failed:", err));
</script>

  <script>
    fetch("footer.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("footer").innerHTML = data;
      })
      .catch(err => console.error("Footer Failed:", err));
  </script>
</body>
</html>

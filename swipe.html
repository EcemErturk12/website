<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <title>AstroSync</title>
</head>

<body>
    <div id="navbar"></div>
    <main>
    </main>
<div id="matchCarousel" class="carousel slide swipe-carousel" data-bs-ride="false">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="img/alienfriend.avif" class="alienundfriend">
    </div>
    <div class="carousel-item">
      <img src="img/woman.avif" class="woman">
    </div>
     <div class="carousel-item">
      <img src="img/alien.avif" class="alien">
    </div>
     <div class="carousel-item">
      <img src="img/man.avif" class="man">
    </div>
  </div>

  <button class="carousel-control-prev" data-bs-target="#matchCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>
  <button class="carousel-control-next" data-bs-target="#matchCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>
  <script>
        fetch("navbar.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;
            });
    </script>
    <script>
        fetch("footer.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("footer").innerHTML = data;
            })
            .catch(err => console.error("Footer Failed:", err));
    </script>
    <div id="footer"></div>
</body>

</html>
